<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Contattaci - Instrinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
      font-family: 'Rubik', sans-serif;
      padding-top: 40px;
    }
    .container {
      max-width: 700px;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #0077b6;
      margin-bottom: 1rem;
    }
    .btn-azzurro {
      background: #0077b6;
      color: white;
      font-weight: 500;
      border-radius: 0.6rem;
    }
    .btn-azzurro:hover {
      background: #005f91;
    }
    .alert-success-custom {
      background-color: #38b000;
      color: white;
      border: none;
      border-radius: 1rem;
    }
    .alert-danger-custom {
      background-color: #d00000;
      color: white;
      border: none;
      border-radius: 1rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="logo">📬 Contattaci</div>
    <a href="/" class="btn btn-outline-secondary">🏠 Torna alla Home</a>
  </div>

  <!-- ✅ Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-4">
        {% for category, message in messages %}
          {% if category == 'success' %}
            <div class="alert alert-success-custom fw-semibold" role="alert">
              {{ message }}
            </div>
          {% elif category == 'danger' %}
            <div class="alert alert-danger-custom fw-semibold" role="alert">
              {{ message }}
            </div>
          {% endif %}
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="/contatti">
    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input type="text" class="form-control" id="nome" name="nome" placeholder="Il tuo nome" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="La tua email" required>
    </div>
    <div class="mb-3">
      <label for="messaggio" class="form-label">Messaggio</label>
      <textarea class="form-control" id="messaggio" name="messaggio" rows="5" placeholder="Scrivici qualcosa..." required></textarea>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-azzurro">📨 Invia Messaggio</button>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
