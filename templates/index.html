{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="instrinder-box">
        <div class="text-center mb-4">
          <h1 class="logo d-inline-block">Instrinder</h1>
        </div>
        <p class="text-center mb-4">{{ _('search_placeholder') }}</p>
        
        <form id="searchForm" action="{{ url_for('search') }}" method="POST" class="mb-4">
          <div class="input-group mb-4">
            <input type="text" name="prodotto" id="searchInput" class="form-control form-control-lg" 
                   placeholder="{{ _('search_placeholder') }}" required>
            <button class="btn btn-azzurro" type="submit">
              <i class="bi bi-search me-1"></i> {{ _('search_button') }}
            </button>
          </div>
          
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="fw-medium">{{ _('all_sites') }}</span>
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" id="toggleAllSites" checked>
            </div>
          </div>
          
          <div class="row g-3" id="sitesContainer">
            <!-- Sites will be populated by JavaScript -->
          </div>
        </form>
        
        <div id="loader" class="text-center d-none">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">{{ _('loading') }}...</span>
          </div>
          <p class="mt-2">{{ _('loading') }}...</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // Available sites with their display names and default state
  const availableSites = [
    { id: 'Centro Chitarre', name: 'Centro Chitarre', checked: true },
    { id: 'Tomassone', name: 'Tomassone', checked: true },
    { id: 'Thomann', name: 'Thomann', checked: true },
    { id: 'Musik Produktiv', name: 'Musik Produktiv', checked: true },
    { id: 'Gear4music', name: 'Gear4music', checked: true },
    { id: 'Andertons', name: 'Andertons', checked: true }
  ];

  // Initialize the page
  document.addEventListener('DOMContentLoaded', function() {
    prepareSites();
    
    // Form submission
    document.getElementById('searchForm').addEventListener('submit', function(e) {
      const selectedSites = Array.from(document.querySelectorAll('input[name="siti"]:checked')).map(el => el.value);
      if (selectedSites.length === 0) {
        e.preventDefault();
        alert('{{ _("select_at_least_one_site") }}');
        return false;
      }
      showLoader();
      return true;
    });
    
    // Toggle all sites
    document.getElementById('toggleAllSites').addEventListener('change', toggleAllSites);
  });

  function prepareSites() {
    const container = document.getElementById('sitesContainer');
    container.innerHTML = '';
    
    availableSites.forEach(site => {
      const col = document.createElement('div');
      col.className = 'col-6 col-md-4 col-lg-3';
      
      const div = document.createElement('div');
      div.className = 'site-option';
      div.innerHTML = `
        <input type="checkbox" 
               class="btn-check site-checkbox" 
               name="siti" 
               value="${site.id}" 
               id="site-${site.id}" 
               autocomplete="off"
               ${site.checked ? 'checked' : ''}>
        <label class="btn btn-outline-primary w-100 text-start" for="site-${site.id}">
          <i class="bi bi-check2-circle me-2"></i> ${site.name}
        </label>
      `;
      
      col.appendChild(div);
      container.appendChild(col);
    });
  
  }
  
  function toggleAllSites() {
    const toggleAll = document.getElementById('toggleAllSites');
    const checkboxes = document.querySelectorAll('.site-checkbox');
    checkboxes.forEach(checkbox => {
      checkbox.checked = toggleAll.checked;
    });
  }
  
  function showLoader() {
    document.getElementById('loader').classList.remove('d-none');
    document.getElementById('searchForm').style.opacity = '0.5';
    document.getElementById('searchForm').style.pointerEvents = 'none';
  }
</script>
{% endblock %}
