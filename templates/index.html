<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Instrinder - Confronta strumenti musicali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
      font-family: 'Rubik', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .instrinder-box {
      background: #ffffff;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 650px;
      width: 100%;
      animation: fadeInUp 0.8s ease;
      position: relative;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      color: #0077b6;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-control, .form-select {
      border-radius: 0.6rem;
      padding: 0.75rem;
    }
    .btn-azzurro {
      background: #0077b6;
      color: white;
      border-radius: 0.6rem;
      padding: 0.75rem 1.2rem;
      font-weight: 500;
      transition: background 0.3s ease;
    }
    .btn-azzurro:hover {
      background: #005f91;
    }
    #loader {
      display: none;
      margin-top: 1.2rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #loader.show {
      display: block;
      opacity: 1;
    }
    .spinner-border {
      width: 2rem;
      height: 2rem;
    }
    .top-right {
      position: absolute;
      top: 20px;
      right: 30px;
    }
    .card-sito {
      border: 2px solid #dee2e6;
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }
    .card-sito:hover {
      background-color: #f1f9ff;
      border-color: #0077b6;
    }
    .card-sito.active {
      background-color: #e3f2fd;
      border-color: #0077b6;
      font-weight: 600;
    }
    @keyframes fadeInUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="instrinder-box">
    <a href="/contatti" class="btn btn-outline-secondary top-right">📬 Contatti</a>
    <div class="logo">🎸 Instrinder</div>
    <form method="POST" action="/search" onsubmit="return handleSubmit();">
      <div class="mb-3">
        <label for="prodotto" class="form-label">Cerca il tuo strumento, ovunque esso sia</label>
        <input type="text" class="form-control" id="prodotto" name="prodotto" placeholder="Es. Fender Stratocaster" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Siti da includere:</label>
        <div class="d-flex flex-wrap gap-2" id="siteCards">
          <div class="card-sito" onclick="toggleAllSites()">Tutti</div>
          {% for sito in ["Thomann", "Musik Produktiv", "Gear4music", "Andertons", "Centro Chitarre", "Tomassone"] %}
          <div class="card-sito" data-value="{{ sito }}" onclick="toggleSite(this)">{{ sito }}</div>
          {% endfor %}
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-azzurro">🔍 Trova offerte</button>
      </div>

      <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2">Caricamento in corso...</div>
      </div>

      <!-- Hidden input per inviare i siti -->
      <div id="sitiInput"></div>
    </form>
  </div>

  <script>
    function handleSubmit() {
      prepareSites();
      showLoader();
      return true;
    }

    function showLoader() {
      const loader = document.getElementById("loader");
      loader.classList.add("show");
    }

    function toggleSite(el) {
      el.classList.toggle("active");
    }

    function toggleAllSites() {
      const all = document.querySelectorAll(".card-sito[data-value]");
      const activeCount = document.querySelectorAll(".card-sito[data-value].active").length;
      const activate = activeCount !== all.length;
      all.forEach(el => el.classList.toggle("active", activate));
    }

    function prepareSites() {
      const selected = document.querySelectorAll(".card-sito.active[data-value]");
      const hiddenDiv = document.getElementById("sitiInput");
      hiddenDiv.innerHTML = '';
      selected.forEach(el => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "siti";
        input.value = el.getAttribute("data-value");
        hiddenDiv.appendChild(input);
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
