{% extends "base.html" %}

{% block title %}Login - Instrinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="instrinder-box">
            <h2 class="text-center mb-4">Accedi</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-azzurro">Login</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <p>Non hai un account? <a href="{{ url_for('signup') }}">Registrati qui</a></p>
            </div>

            <hr class="my-4">

            <div class="d-grid gap-2">
                <a href="{{ url_for('login_oauth', provider='google') }}" class="btn btn-outline-danger">
                    <i class="bi bi-google me-2"></i> Accedi con Google
                </a>
                <a href="{{ url_for('login_oauth', provider='facebook') }}" class="btn btn-outline-primary">
                    <i class="bi bi-facebook me-2"></i> Accedi con Facebook
                </a>
                <a href="{{ url_for('login_oauth', provider='twitter') }}" class="btn btn-outline-dark">
                    <i class="bi bi-twitter-x me-2"></i> Accedi con X
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
