{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">⚠️ Si è verificato un errore</h4>
        <p>{{ error_message }}</p>
        <hr>
        <p class="mb-0">Dettagli: {{ error_details }}</p>
    </div>
    <a href="/" class="btn btn-primary">Torna alla Home</a>
</div>
{% endblock %}
