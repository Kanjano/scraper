<div class="auth-container">
    <div class="auth-card">
        <h2>Registrazione</h2>

        @if (error) {
        <div class="alert error">{{ error }}</div>
        }

        <form (ngSubmit)="onSubmit()">
            <div class="name-row">
                <div class="form-group half">
                    <label for="name">Nome</label>
                    <input type="text" id="name" [(ngModel)]="name" name="name" required>
                </div>
                <div class="form-group half">
                    <label for="surname">Cognome</label>
                    <input type="text" id="surname" [(ngModel)]="surname" name="surname" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" required>
            </div>

            <div class="form-check">
                <input type="checkbox" id="privacy" [(ngModel)]="privacyAccepted" name="privacy">
                <label for="privacy">Accetto la Privacy Policy</label>
            </div>

            <div class="form-check">
                <input type="checkbox" id="newsletter" [(ngModel)]="newsletterOptIn" name="newsletter">
                <label for="newsletter">Iscrivimi alla Newsletter</label>
            </div>

            <button type="submit" class="btn-primary" [disabled]="loading">
                {{ loading ? 'Registrazione...' : 'Registrati' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Hai già un account? <a routerLink="/login">Accedi</a></p>
        </div>
    </div>
</div>
